name: Zero-Trust CI Security Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  security-scan-and-build:
    name: Scan, Build, Sign & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # required for Cosign keyless signing
      security-events: write # required for uploading SARIF to GitHub

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 1. Scan source code & repo for secrets ──────────────────────────
      - name: Scan repo for secrets and misconfigs (Trivy fs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          exit-code: "1"
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-fs.sarif

      - name: Upload fs scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      # ── 2. Build image ───────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 3. Scan built image for CVEs ─────────────────────────────────────
      - name: Scan image for CVEs (Trivy image)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          exit-code: "1"
          severity: CRITICAL
          format: sarif
          output: trivy-image.sarif

     - name: Upload image scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # ── 4. Generate SBOM ─────────────────────────────────────────────────
      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Generate SBOM (SPDX JSON)
        run: |
          syft ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            -o spdx-json=sbom.spdx.json \
            -o table
          echo "SBOM generated with $(cat sbom.spdx.json | python3 -c 'import json,sys; d=json.load(sys.stdin); print(len(d.get(\"packages\",[])))') packages"

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.spdx.json

      # ── 5. Keyless image signing with Cosign ─────────────────────────────
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with Cosign (keyless via OIDC)
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}

      - name: Attach SBOM to image with Cosign
        run: |
          cosign attach sbom \
            --sbom sbom.spdx.json \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}

      - name: Verify image signature (smoke test)
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build-push.outputs.digest }}

      # ── 6. Update infra repo to trigger ArgoCD deploy ────────────────────
      - name: Update image tag in infra repo
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository_owner }}/zero-trust-infra/contents/charts/my-app/values.yaml \
            -f message="chore: bump image to sha-${SHORT_SHA}" \
            -f content="$(cat charts/my-app/values.yaml | \
               sed "s|tag:.*|tag: sha-${SHORT_SHA}|" | base64 -w0)" \
            -f sha="$(gh api /repos/${{ github.repository_owner }}/zero-trust-infra/contents/charts/my-app/values.yaml --jq .sha)"
